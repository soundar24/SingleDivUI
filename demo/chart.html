<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Charts</title>
</head>

<body>
    <link href="../dist/singledivui.min.css" rel="stylesheet" />
    <script src="../dist/singledivui.min.js"></script>

    <h1>SingleDivUI</h1>

    <div class="row">
        <div class="cell">
            <h2>Line Chart</h2>
            <div id="chart1"></div>
        </div>
        <div class="cell">
            <h2>Bar Chart</h2>
            <div id="chart2"></div>
        </div>
        <div class="cell">
            <h2>Area Chart</h2>
            <div id="chart3"></div>
        </div>
    </div>

    <style>
        body {
            padding: 10px 35px;
            font-family: Verdana, Arial, sans-serif;
        }
        .row {
            display: flex;
        }
        .cell {
            padding: 0px 35px;
        }
    </style>

    <script>
        const { Chart } = SingleDivUI;

        const options = {
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
            series: {
                points: [15, 9, 25, 18, 31, 25]
            }
        },
        height: 200,
        width: 400
        };

        new Chart('#chart1',  {
            type: 'line',
            ...options  
        });

        new Chart('#chart2',  {
            type: 'bar',
            ...options
        });

        new Chart('#chart3',  {
            type: 'area',
            ...options
        });
    </script>
</body>

</html>
